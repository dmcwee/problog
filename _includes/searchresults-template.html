<div id="searchresults" class="container-fluid blog-searchresults d-none" data-bs-theme="{{ site.bs-theme}}">
    <div class="modal" style="display:contents;">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title" data-bs-theme="dark">Search Results</h1>
                <button type="button" class="btn-close" aria-label="Close Search Results" onclick="closeResults();"></button>
            </div>
            <div class="modal-body">
            </div>
        </div>
    </div>

    <template id="searchresults-template">
        <div class="card">
            <div class="row">
                <div class="col-2" data-field="image-col">
                    <img src="" alt="" class="img-fluid rounded-start with-footer" />
                </div>
                <div class="col">
                    <div class="card-body">
                        <div class="card-title"><a href="#" data-field="link" class="link-secondary"></a></div>
                        <div class="card-text" data-field="snippet"></div>
                    </div>
                </div>
            </div>
        </div>
    </template>
</div>
