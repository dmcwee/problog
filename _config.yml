# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: ProBlog Jekyll Theme
email: ""
description: >- # this means to ignore newlines until "baseurl:"
  Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed euismod, sapien vel bibendum bibendum, velit sapien aliquet nunc, 
  vel tincidunt nulla magna vel mauris. 
baseurl: "" # the subpath of your site, e.g. /blog
domain: ""
url: "" # the base hostname & protocol for your site, e.g. http://example.com

# Google analytics setting
google_analytics: ""

# Google Search JSON API setting (Deprecated by Google, but still available for existing users)
google_search_key: ""
google_search_id: ""

# Google Vertex AI Search setting (Requires Google Cloud account, Project, AI Application, and API key)
google_vertex_appid: ""
google_vertex_projectid: ""
google_vertex_apikey: ""

# Bootstrap Theme setting exposure
bs-theme: "light"
nav-bs-theme: "dark"
bs-codetheme: "dark"

# Default image use with SEO and social media sharing. You can set it to a default image URL or leave it empty to use the first image in the post.
image: ""

# Build settings
# permalink: /:year/:month/:day/:title/
# highlighter: rouge
# markdown: kramdown
# kramdown:
#   highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-paginate

paginate: 2

defaults:
- 
  scope:
    path: ""
  values:
    layout: "page"
    seo_type: "Site"
-
  scope:
    path: "_posts"
  values:
    layout: "post"
    seo_type: "BlogPosting"
    title-bs-theme: "light"

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
